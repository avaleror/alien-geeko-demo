# CLUSTER_NAME is the display name shown in the Nostromo terminal UI.
# Override this value per cluster via the Kustomize overlays in overlays/.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alien-geeko-config
  namespace: alien-geeko
data:
  CLUSTER_NAME: "EDGE-CLUSTER"
