# Overlay for Vessel Beta — x86 NUC provisioned via Elemental phone-home.
# Label: edge-type=x86-elemental
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../k8s/00-namespace.yaml
  - ../../k8s/01-rbac.yaml
  - ../../k8s/02-deployment.yaml
  - ../../k8s/03-configmap.yaml
  - ../../k8s/04-service.yaml
patches:
  - target:
      kind: ConfigMap
      name: alien-geeko-config
      namespace: alien-geeko
    patch: |-
      - op: replace
        path: /data/CLUSTER_NAME
        value: "VESSEL-BETA-ELEMENTAL"
