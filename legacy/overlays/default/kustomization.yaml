#
# Default fallback overlay — no CLUSTER_NAME patch applied.
# Used by Fleet for any demo=true cluster that does not match
# a more specific target (pi-cluster, x86-cluster).
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../k8s/00-namespace.yaml
  - ../k8s/01-rbac.yaml
  - ../k8s/02-deployment.yaml
  - ../k8s/03-configmap.yaml
  - ../k8s/04-service.yaml
