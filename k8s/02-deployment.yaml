---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alien-geeko
  namespace: alien-geeko
  labels:
    app: alien-geeko
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alien-geeko
  template:
    metadata:
      labels:
        app: alien-geeko
    spec:
      serviceAccountName: alien-geeko
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alien-geeko
          image: docker.io/avaleror/alien-geeko:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLUSTER_NAME
              valueFrom:
                configMapKeyRef:
                  name: alien-geeko-config
                  key: CLUSTER_NAME
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/arch
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: alien-geeko
