<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 1100px;
    height: 580px;
    background: #050F0A;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
    position: relative;
  }

  /* scanlines */
  body::after {
    content:'';
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px);
    pointer-events:none;
    z-index:100;
  }

  svg {
    width: 1100px;
    height: 580px;
    position: absolute;
    top: 0; left: 0;
  }
</style>
</head>
<body>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4A8A28"/>
    </marker>
    <filter id="glow">

      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background grid -->

  <rect x="330" y="178" width="10" height="10" fill="#73BE44"/>

  <rect x="822" y="497" width="8" height="8" fill="#17B3A3"/>

  <text x="720" y="488" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="5" fill="#17B3A3">PROV: RANCHER IMPORT</text>
