#
# Overlay for x86 clusters (Mission Control NUC).
# Sets CLUSTER_NAME to identify the x86 node in the Nostromo terminal UI.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../k8s/00-namespace.yaml
  - ../k8s/01-rbac.yaml
  - ../k8s/02-deployment.yaml
  - ../k8s/03-configmap.yaml
  - ../k8s/04-service.yaml
patches:
  - target:
      kind: ConfigMap
      name: alien-geeko-config
      namespace: alien-geeko
    patch: |-
      - op: replace
        path: /data/CLUSTER_NAME
        value: "X86-EDGE-NODE"
