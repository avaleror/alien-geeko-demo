# MetalLB L2 config — applied after metallb-native.yaml from the URL manifest
#
# VIP assignments:
#   192.168.8.9  — Ollama API   (port 11434)
#   192.168.8.10 — Open WebUI   (port 8080)
#
# Applied AFTER MetalLB CRDs are ready — ordering guaranteed by filename prefix.
---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: ai-cluster-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.8.9-192.168.8.10
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: ai-cluster-l2
  namespace: metallb-system
spec:
  ipAddressPools:
    - ai-cluster-pool
