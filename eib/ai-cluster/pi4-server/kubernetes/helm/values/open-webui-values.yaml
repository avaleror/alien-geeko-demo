# Open WebUI Helm values — open-webui/open-webui chart
# Chat UI for Ollama — runs on Pi 4 (no GPU needed)
# Accessible at http://192.168.8.10:8080 via MetalLB L2

# ─── Disable bundled Ollama — we deploy our own ──────────────────────────────
ollama:
  enabled: false

# ─── Disable optional subcharts not needed for this demo ─────────────────────
pipelines:
  enabled: false

websocket:
  enabled: false

# ─── Point to our Ollama LoadBalancer VIP ─────────────────────────────────────
ollamaUrls:
  - "http://192.168.8.9:11434"

# ─── Scheduling — run on Pi 4, leave Orin GPU free for inference ─────────────
nodeSelector:
  kubernetes.io/hostname: pi4-server

# ─── Service — LoadBalancer assigned by MetalLB (192.168.8.10) ───────────────
service:
  type: LoadBalancer
  port: 8080
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.8.10"

# ─── Persistence — stores chat history and user accounts ─────────────────────
persistence:
  enabled: true
  size: 2Gi
  accessModes:
    - ReadWriteOnce

# ─── Resources — lightweight web app on Pi 4 ─────────────────────────────────
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "1"

# ─── Probes — wait for Ollama to be reachable before marking ready ─────────────
startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 12
