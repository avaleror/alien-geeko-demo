apiVersion: 1.3

# ─────────────────────────────────────────────────────────────────────────────
# Vessel AI — Pi 4 Server Node
# Role: k3s control-plane + etcd
# MAC:  2C:CF:67:29:DB:C6  →  router assigns 192.168.8.7 via DHCP reservation
# ─────────────────────────────────────────────────────────────────────────────

image:
  imageType: raw
  arch: aarch64
  baseImage: SL-Micro.aarch64-6.2-RaspberryPi-GM.raw
  outputImageName: vessel-ai-pi4-server.raw

operatingSystem:
  rawConfiguration:
    diskSize: 32G

  time:
    timezone: Europe/Prague
    ntp:
      forceWait: true
      pools:
        - 2.suse.pool.ntp.org

  systemd:
    enable:
      - cockpit.socket

  keymap: us

  users:
    - username: root
      encryptedPassword: "CHANGE-ME"    # openssl passwd -6 yourpassword
      createHomeDir: true
    - username: suse-user
      encryptedPassword: "CHANGE-ME"    # openssl passwd -6 yourpassword
      createHomeDir: true
      sshKeys:
        - "CHANGE-ME"                   # cat ~/.ssh/id_rsa.pub or id_ed25519.pub

  packages:
    packageList:
      - jq
      - container-selinux
      - k3s-selinux
      - git
    sccRegistrationCode: "CHANGE-ME"    # SUSE Customer Center registration code

# ─────────────────────────────────────────────────────────────────────────────
# k3s server — token + CNI + selinux config in kubernetes/config/server.yaml
# ─────────────────────────────────────────────────────────────────────────────
kubernetes:
  version: v1.34.2+k3s1

  network:

  nodes:
    - hostname: pi4-server
      type: server
      initializer: true

  manifests:
    urls:
      - https://raw.githubusercontent.com/metallb/metallb/v0.14.8/config/manifests/metallb-native.yaml

  helm:
    repositories:
      - name: otwld
        url: https://helm.otwld.com/
      - name: open-webui
        url: https://helm.openwebui.com/

    charts:
      # ⚠️  Verify latest chart version: helm search repo otwld/ollama
      - name: ollama
        version: "0.74.0"
        repositoryName: otwld
        targetNamespace: ollama
        createNamespace: true
        valuesFile: ollama-values.yaml

      # ⚠️  Verify latest chart version: helm search repo open-webui/open-webui
      - name: open-webui
        version: "3.3.0"
        repositoryName: open-webui
        targetNamespace: open-webui
        createNamespace: true
        valuesFile: open-webui-values.yaml
