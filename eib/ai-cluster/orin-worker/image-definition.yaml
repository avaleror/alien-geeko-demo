apiVersion: 1.3

# ─────────────────────────────────────────────────────────────────────────────
# Vessel AI — NVIDIA Jetson Orin Node
# Role: standalone k3s single-node cluster + NVIDIA stack + Ollama + Open WebUI
# MAC:  48:B0:2D:EA:6B:C3  →  router assigns 192.168.8.8 via DHCP reservation
#
# Base image: SL Micro 6.2 generic aarch64 — no Jetson-specific image exists yet.
# ─────────────────────────────────────────────────────────────────────────────

image:
  imageType: raw
  arch: aarch64
  baseImage: SL-Micro.aarch64-6.2-Default-GM.raw
  outputImageName: vessel-ai-orin-server.raw

operatingSystem:
  rawConfiguration:
    diskSize: 256G

  time:
    timezone: Europe/Prague
    ntp:
      forceWait: true
      pools:
        - 2.suse.pool.ntp.org

  systemd:
    enable:
      - cockpit.socket

  keymap: us

  users:
    - username: root
      encryptedPassword: "CHANGE-ME"    # openssl passwd -6 yourpassword
      createHomeDir: true
    - username: suse-user
      encryptedPassword: "CHANGE-ME"    # openssl passwd -6 yourpassword
      createHomeDir: true
      sshKeys:
        - "CHANGE-ME"                   # cat ~/.ssh/id_rsa.pub or id_ed25519.pub

  # ─── NVIDIA AI software stack ────────────────────────────────────────────────
  #
  # LAYER 1 — JetPack BSP (pre-baked into the SL Micro Jetson base image)
  #   CUDA 12.x runtime, cuDNN 9.x, TensorRT 10.x, VPI 3.x, DLA 3.x
  #   These are part of the Jetson Linux (L4T) driver package.
  #   No separate packages needed — they come with the base image.
  #
  # LAYER 2 — nvidia-container-toolkit (installed here via EIB packages)
  #   Bridges the host JetPack GPU stack into containers.
  #   99-nvidia-setup.sh (combustion) runs nvidia-ctk runtime configure
  #   targeting the k3s containerd config path before k3s first starts.
  #   This is what makes `nvidia.com/gpu: 1` resource requests work in pods.
  #
  # LAYER 3 — NVIDIA Device Plugin (deployed as DaemonSet via manifest)
  #   Advertises GPU as a schedulable Kubernetes resource.
  #   Defined in kubernetes/manifests/02-nvidia-device-plugin.yaml
  #
  # LAYER 4 — Jetson performance mode (systemd service via combustion)
  #   99-nvidia-setup.sh creates jetson-performance.service which runs
  #   `nvpmodel -m 0` + `jetson_clocks` at every boot.
  #   Without this: GPU runs at ~611 MHz. With this: ~1007 MHz (+39%).
  #
  packages:
    packageList:
      - jq
      - container-selinux
      - k3s-selinux
      - git
      - nvidia-container-toolkit    # container runtime hook for GPU passthrough
      - libnvidia-container1        # core library dependency of the toolkit
    sccRegistrationCode: "CHANGE-ME"    # SUSE Customer Center registration code
    additionalRepos:
      # Official NVIDIA Container Toolkit repo — stable RPM build for ARM64
      - url: https://nvidia.github.io/libnvidia-container/stable/rpm/aarch64
        unsigned: false

# ─────────────────────────────────────────────────────────────────────────────
# k3s standalone server — NVIDIA runtime class + device plugin + Ollama + Open WebUI
# ─────────────────────────────────────────────────────────────────────────────
kubernetes:
  version: v1.34.2+k3s1

  network:

  nodes:
    - hostname: orin-server
      type: server
      initializer: true

  helm:
    repositories:
      - name: otwld
        url: https://helm.otwld.com/
      - name: open-webui
        url: https://helm.openwebui.com/

    charts:
      - name: ollama
        version: "1.54.0"
        repositoryName: otwld
        targetNamespace: ollama
        createNamespace: true
        valuesFile: ollama-values.yaml

      - name: open-webui
        version: "13.3.1"
        repositoryName: open-webui
        targetNamespace: open-webui
        createNamespace: true
        valuesFile: open-webui-values.yaml
