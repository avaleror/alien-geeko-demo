# Ollama Helm values — otwld/ollama chart
# Standalone single-node deployment on NVIDIA Jetson Orin (192.168.8.8)
# Open WebUI accesses Ollama via ClusterIP service DNS — no external IP needed

# ─── GPU ─────────────────────────────────────────────────────────────────────
ollama:
  gpu:
    enabled: true
    type: nvidia
    number: 1
    nvidiaResource: "nvidia.com/gpu"

  # Models to pull automatically on first start.
  # phi3:mini (3.8B, ~2.3 GB) fits comfortably in the Orin's 8 GB unified memory.
  # Other options: llama3.2:3b (~2 GB), gemma2:2b (~1.6 GB)
  models:
    pull:
      - phi3:mini

# ─── Runtime ─────────────────────────────────────────────────────────────────
runtimeClassName: nvidia

# ─── Resources ───────────────────────────────────────────────────────────────
# Jetson Orin 8 GB has unified CPU+GPU memory.
resources:
  requests:
    memory: "2Gi"
    cpu: "500m"
  limits:
    memory: "7Gi"
    cpu: "4"
    nvidia.com/gpu: "1"

# ─── Persistence — model cache survives pod restarts ─────────────────────────
persistentVolume:
  enabled: true
  size: 20Gi
  accessModes:
    - ReadWriteOnce

# ─── Service — NodePort, accessible externally at http://192.168.8.8:30434 ───
service:
  type: NodePort
  port: 11434
  nodePort: 30434

# ─── Probes — first boot pulls the model, allow extra startup time ────────────
livenessProbe:
  enabled: true
  initialDelaySeconds: 120
  periodSeconds: 30
  failureThreshold: 10

readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10

# ─── Environment ─────────────────────────────────────────────────────────────
extraEnv:
  - name: OLLAMA_HOST
    value: "0.0.0.0:11434"
  - name: OLLAMA_KEEP_ALIVE
    value: "24h"
  - name: CUDA_VISIBLE_DEVICES
    value: "0"
  - name: OLLAMA_NUM_GPU
    value: "1"
