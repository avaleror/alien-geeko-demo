# nmstate network config for orin-worker
# Filename must match the node hostname exactly.
# Jetson Orin interface is typically eth0 (built-in GbE).
# Verify with: ip link show  after first boot.
routes:
  config:
    - destination: 0.0.0.0/0
      next-hop-address: 192.168.8.1     # adjust to your gateway
      next-hop-interface: eth0
dns-resolver:
  config:
    server:
      - 8.8.8.8
      - 8.8.4.4
interfaces:
  - name: eth0
    type: ethernet
    state: up
    ipv4:
      enabled: true
      dhcp: false
      address:
        - ip: 192.168.8.8
          prefix-length: 24
    ipv6:
      enabled: false
      dhcp: false
