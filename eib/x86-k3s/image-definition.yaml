apiVersion: 1.3
image:
  imageType: iso
  arch: x86_64
  baseImage: SL-Micro.x86_64-6.2-Base-SelfInstall-GM.install.iso  # download from SUSE Customer Center
  outputImageName: alien-geeko-x86-k3s.iso

operatingSystem:
  isoConfiguration:
    installDevice: /dev/sda   # change to /dev/nvme0n1 for NVMe drives
  time:
    timezone: UTC
    ntp:
      forceWait: true
      pools:
        - 2.suse.pool.ntp.org
  systemd:
    enable:
      - cockpit.socket
  keymap: us
  users:
    - username: root
      encryptedPassword: "CHANGE-ME"   # openssl passwd -6 yourpassword
      createHomeDir: true
    - username: suse-user
      encryptedPassword: "CHANGE-ME"   # openssl passwd -6 yourpassword
      createHomeDir: true
      sshKeys:
        - "CHANGE-ME"                  # cat ~/.ssh/id_ed25519.pub
  packages:
    packageList:
      - jq
      - git
      - container-selinux
      - k3s-selinux
    sccRegistrationCode: "CHANGE-ME"   # SUSE Customer Center registration code

kubernetes:
  version: v1.35.3+k3s1
  nodes:
    - hostname: vessel-x86
      initializer: true
      type: server
  helm:
    charts:
      - name: alien-geeko
        version: 0.1.0
        repositoryName: alien-geeko
        targetNamespace: alien-geeko
        createNamespace: true
        installationNamespace: kube-system
        valuesFile: alien-geeko-values.yaml
    repositories:
      - name: alien-geeko
        url: https://avaleror.github.io/alien-geeko-demo
