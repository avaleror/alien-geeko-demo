apiVersion: 1.3
image:
  imageType: raw
  arch: aarch64
  baseImage: SL-Micro.aarch64-6.2-RaspberryPi-GM.raw
  outputImageName: k3s-pi4-eib.raw
operatingSystem:
  rawConfiguration:
    diskSize: 32G
  time:
    timezone: Europe/Paris
    ntp:
      forceWait: true
      pools:
        - 2.suse.pool.ntp.org
  systemd:
    enable:
      - cockpit.socket
  keymap: us
  users:
  - username: root
    encryptedPassword: "CHANGE-ME"    # openssl passwd -6 yourpassword
    createHomeDir: true
  - username: suse-user
    encryptedPassword: "CHANGE-ME"    # openssl passwd -6 yourpassword
    createHomeDir: true
    sshKeys:
      - "CHANGE-ME"                   # cat ~/.ssh/id_rsa.pub or id_ed25519.pub
  packages:
    packageList:
      - jq
      - container-selinux
      - k3s-selinux
      - git
    sccRegistrationCode: "CHANGE-ME"    # SUSE Customer Center registration code
kubernetes:
  version: v1.34.2+k3s1
  network:
  nodes:
    - hostname: pi4-k3s-eib
      initializer: true
      type: server
